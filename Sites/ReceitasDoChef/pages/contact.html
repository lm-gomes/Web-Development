<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="contact.css">


    <title>Contato - Receitas do Chef</title>
</head>
<body>
    <header class="main-header">
        <figure class="header-icon">
            <div class="icon-parent">
                <img class="icon-source" src="../img/icon/chefs-hat.png">
                <h1>Receitas do Chef</h1>
            </div>
        </figure>
        <div class="header-search">
            <input type="search" class="search-bar" placeholder="Pesquise nomes de receitas, tipos de receitas ou perfis">
            <figure class="search-icon">
                <img src="../img/icon/search.png">
            </figure>
        </div>
        <nav class="header-nav">
            <ul class="nav-ul">
                <li class="header-li"><a href="../index.html">Home</a></li>
                <li class="header-li"><a href="recipes.html">Receitas</a></li>
                <li class="header-li"><a href="contact.html">Contato</a></li>
                <li class="header-li"><a href="about.html">Sobre</a></li>
            </ul>
        </nav>
    </header>
    <main class="main-page">
        <section class="main-section">
                <div class="section-div">
                    <h2>Entre em contato com a gente!</h2>
                    <div class="main-section-form">
                        <form>
                            <input class="input-form" type="text" placeholder="Nome completo">
                            <input class="input-form" type="email" placeholder="E-mail">
                            <textarea placeholder="Mensagem"></textarea>
                            <button type="submit"">Enviar</button>
                        </form>
                    </div>
                </div>
                <div class="main-section-figure">
                    <figure>
                        <img src="../img/figures/cooking-together.jpg">
                    </figure>
                </div>
        </section>

    </main>
    <footer class="main-footer">
        <section class="footer-section1">
            <div class=footer-title>
                <h1>Siga-nos em nossas redes-sociais!</h1>
                <img src="../img/icon/chefs-hat.png">

            </div>
        </section>
        <section class="footer-section2">
            <figure class="footer-social"><img src="../img/icon/instagram.png"></figure>
            <figure class="footer-social"><img src="../img/icon/facebook.png"></figure>
            <figure class="footer-social"><img src="../img/icon/youtube.png"></figure>
        </section>
        <section class="footer-section3">
            <div>
                <p><u>Diretrizes de privacidade de dados</u></p>
                <p><u>Termos de uso</u></p>
                <p><u>Opção de privacidade</u></p>
            </div>
            <div>
                <p><u>Sobre nós</u></p>
                <p><u>Oportunidades</u></p>
                <p><u>Reportar erro</u></p>
            </div>
        </section>
    </footer>
</body>
</html>
